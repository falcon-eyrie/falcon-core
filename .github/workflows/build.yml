name: Format and Compile
on:
  pull_request:
    branches: [develop]

jobs:
  build-linux:
    name: Format and Compile
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            build-essential \
            libzmq3-dev \
            pkg-config \
            git \
            wget \
            xz-utils

            mkdir -p /tmp/llvm
            cd /tmp/llvm
            wget -q -O LLVM-21.1.5-Linux-X64.tar.xz \
            https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.5/LLVM-21.1.5-Linux-X64.tar.xz
            tar -xf LLVM-21.1.5-Linux-X64.tar.xz
            sudo mv LLVM-21.1.5-Linux-X64/bin/clang-format /usr/local/bin/
            sudo chmod +x /usr/local/bin/clang-format
            clang-format --version

      - name: Run format check
        run: |
          sh scripts/format.sh
          # Check for any changes caused by formatting
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "Following files seems to be not formatted. Please run './scripts/format.sh' locally and commit the changes."
            git --no-pager diff --name-only
            exit 1
          fi

