name: Format and Compile

on:
  pull_request:
    branches: [develop]

jobs:
  build-linux:
    name: Format and Compile
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libzmq3-dev \
            pkg-config \
            git \
            wget \
            xz-utils

          sh scripts/setup/install_cmake.sh
          sh scripts/setup/install_llvm.sh


      - name: Run clang-format
        run: |
          sh scripts/format.sh
          # Check for any changes caused by formatting
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "Following files seems to be not formatted. Please run './scripts/format.sh' locally and commit the changes."
            git --no-pager diff --name-only
            exit 1
          fi

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Debug \
            -DIGNORE_EXTENSIONS=ON \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++

      - name: Build project
        run: |
          cd build
          make -j$(nproc)

      - name: Run clang-tidy
        run: |
          sh scripts/tidy.sh
