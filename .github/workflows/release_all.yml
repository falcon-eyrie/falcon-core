name: Release backend and GUI

on:
    workflow_dispatch:
        inputs:
            version:
                description: "Version name for this release"
                required: true
                default: "1.0.0"

jobs:
    build-linux:
        name: Release backend and GUI
        runs-on: ubuntu-24.04

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install dependencies
              run: |
                  sh scripts/setup/install_deps.sh
                  sh scripts/setup/install_cmake.sh
                  sh scripts/setup/install_llvm.sh

                  sudo apt-get update
                  sudo apt-get install -y libgtk-3-dev
                  curl -fsSL https://fvm.app/install.sh | bash
                  echo "/home/runner/fvm/bin" >> $GITHUB_PATH
                  echo "/home/runner/fvm/versions/3.38.5/bin" >> $GITHUB_PATH
                  export PATH="/home/runner/fvm/bin:$PATH"

                  fvm install 3.38.5
                  fvm global 3.38.5

            - name: Configure CMake
              run: |
                  mkdir -p build
                  cd build
                  C_PATH=/usr/local/bin/clang
                  CXX_PATH=/usr/local/bin/clang++
                  cmake .. \
                    -DCMAKE_BUILD_TYPE=Release \
                    -DCMAKE_C_COMPILER=$C_PATH \
                    -DCMAKE_CXX_COMPILER=$CXX_PATH

            - name: Build backend
              run: |
                  cd build
                  make -j$(nproc)

            - name: Build GUI
              run: |
                  flutter pub get
                  flutter build linux --release

            - name: Prepare release
              run: |
                  mkdir -p falcon_gui/build/linux/x64/release/bundle/bin
                  cp build/falcon/falcon falcon_gui/build/linux/x64/release/bundle/bin
                  cp falcon_gui/assets/icon.png falcon_gui/build/linux/x64/release/bundle/
                  tar -czf falcon_linux_v${{ github.event.inputs.version }}.tar.gz -C $BUNDLE_DIR .

            - name: Publish artifact
              uses: actions/upload-artifact@v4
              with:
                  name: falcon_gui
                  path: falcon_gui/build/linux/x64/release/bundle/
                  if-no-files-found: error

            - name: Create GitHub Release
              uses: ncipollo/release-action@v1.20.0
              with:
                  tag: v${{ github.event.inputs.version }}
                  name: Release v${{ github.event.inputs.version }}
                  commit: ${{ github.sha }}
                  generateReleaseNotes: false
                  artifacts: falcon_linux_v${{ github.event.inputs.version }}.tar.gz
